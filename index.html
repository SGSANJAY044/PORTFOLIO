<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANJAY | DEV</title>
  <link rel="icon" type="image/x-icon" href="./public/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
  <style>
    /* Active navigation state */
    #nav-links a.active .nav-indicator {
      width: 4rem;
      background-color: rgb(226 232 240);
    }
    #nav-links a.active .nav-text {
      color: rgb(226 232 240);
    }
  </style>
</head>
<body class="bg-slate-900 leading-relaxed text-slate-400 antialiased selection:bg-teal-300 selection:text-teal-900">
  <div id="__next">
    <div class="__variable_20b187 group/spotlight relative">
      <!-- Spotlight Effect -->
      <div id="spotlight" class="pointer-events-none fixed inset-0 z-30 transition duration-300 lg:absolute" style="background:radial-gradient(600px circle at 0px 0px, rgba(29, 78, 216, 0.15), transparent 80%)"></div>
      
      <div class="mx-auto min-h-screen max-w-screen-xl px-6 py-12 font-sans md:px-12 md:py-20 lg:px-24 lg:py-0">
        <!-- Skip to Content Link -->
        <a href="#content" class="absolute left-0 top-0 block -translate-x-full rounded bg-gradient-to-br from-teal-400 via-blue-500 to-purple-600 px-4 py-3 text-sm font-bold uppercase tracking-widest text-white focus-visible:translate-x-0">Skip to Content</a>
        
        <div class="lg:flex lg:justify-between lg:gap-4">
          <!-- Header / Sidebar -->
          <header class="lg:sticky lg:top-0 lg:flex lg:max-h-screen lg:w-1/2 lg:flex-col lg:justify-between lg:py-24">
            <div>
              <!-- Hero Section -->
              <h1 id="hero-name" class="text-4xl font-bold tracking-tight text-slate-200 sm:text-5xl"></h1>
              <h2 id="hero-title" class="mt-3 text-lg font-medium tracking-tight text-slate-200 sm:text-xl"></h2>
              <p id="hero-description" class="mt-4 max-w-xs leading-normal"></p>
              
              <!-- Navigation -->
              <nav class="nav hidden lg:block" aria-label="In-page jump links">
                <ul id="nav-links" class="mt-16 w-max">
                  <!-- Populated by JavaScript -->
                </ul>
              </nav>
            </div>
            
            <!-- Social Links -->
            <ul id="social-links" class="ml-1 mt-8 flex items-center" aria-label="Social media">
              <!-- Populated by JavaScript -->
            </ul>
          </header>
          
          <!-- Main Content -->
          <main id="content" class="pt-24 lg:w-1/2 lg:py-24">
            <!-- About Section -->
            <section id="about" class="mb-16 scroll-mt-16 md:mb-24 lg:mb-36 lg:scroll-mt-24" aria-label="About me">
              <div class="sticky top-0 z-20 -mx-6 mb-4 w-screen bg-slate-900/75 px-6 py-5 backdrop-blur md:-mx-12 md:px-12 lg:sr-only lg:relative lg:top-auto lg:mx-auto lg:w-full lg:px-0 lg:py-0 lg:opacity-0">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-200 lg:sr-only">About</h2>
              </div>
              <div id="about-content">
                <!-- Populated by JavaScript -->
              </div>
            </section>
            
            <!-- Experience Section -->
            <section id="experience" class="mb-16 scroll-mt-16 md:mb-24 lg:mb-36 lg:scroll-mt-24" aria-label="Work experience">
              <div class="sticky top-0 z-20 -mx-6 mb-4 w-screen bg-slate-900/75 px-6 py-5 backdrop-blur md:-mx-12 md:px-12 lg:sr-only lg:relative lg:top-auto lg:mx-auto lg:w-full lg:px-0 lg:py-0 lg:opacity-0">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-200 lg:sr-only">Experience</h2>
              </div>
              <div>
                <ol id="experience-list" class="group/list">
                  <!-- Populated by JavaScript -->
                </ol>
              </div>
            </section>
            
            <!-- Projects Section -->
            <section id="projects" class="mb-16 scroll-mt-16 md:mb-24 lg:mb-36 lg:scroll-mt-24" aria-label="Selected projects">
              <div class="sticky top-0 z-20 -mx-6 mb-4 w-screen bg-slate-900/75 px-6 py-5 backdrop-blur md:-mx-12 md:px-12 lg:sr-only lg:relative lg:top-auto lg:mx-auto lg:w-full lg:px-0 lg:py-0 lg:opacity-0">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-200 lg:sr-only">Projects</h2>
              </div>
              <div>
                <ul id="projects-list" class="group/list">
                  <!-- Populated by JavaScript -->
                </ul>
              </div>
            </section>
            
            <!-- Footer -->
            <footer id="footer-content" class="max-w-md pb-16 text-sm text-slate-500 sm:pb-0">
              <!-- Populated by JavaScript -->
            </footer>
          </main>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
